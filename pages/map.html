<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />

  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://duantest001-rgb.github.io/vangvieng-explorer/pages/map.html">
  <meta property="og:title" content="ແຜນທີ່ວັງວຽງ — VangVieng Explorer">
  <meta property="og:description" content="ແຜນທີ່ສະຖານທີ່ທ່ອງທ່ຽວ, ທີ່ພັກ, ຮ້ານອາຫານ ທັງໝົດໃນວັງວຽງ ລາວ">
  <meta property="og:image" content="https://duantest001-rgb.github.io/vangvieng-explorer/assets/logo.png">
  <meta property="og:url" content="https://duantest001-rgb.github.io/vangvieng-explorer/pages/map.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ແຜນທີ່ວັງວຽງ — VangVieng Explorer">
  <meta name="twitter:description" content="ແຜນທີ່ສະຖານທີ່ທ່ອງທ່ຽວ, ທີ່ພັກ, ຮ້ານອາຫານ ທັງໝົດໃນວັງວຽງ ລາວ">
  <meta name="theme-color" content="#1050a0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="VVExplorer">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VangVieng Explorer 🌿</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/map.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo" style="color:var(--dark)">
        <img src="../assets/logo.png" alt="logo" class="nav-logo-img" />
        <span class="logo-text">VangVieng<strong>Explorer</strong></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="../index.html" class="nav-link" data-i18n="nav.home">ໜ້າຫຼັກ</a>
        <a href="explore.html" class="nav-link" data-i18n="nav.explore">ສຳຫຼວດ</a>
        <a href="map.html" class="nav-link active" data-i18n="nav.map">ແຜນທີ່</a>
        <a href="ai-chat.html" class="nav-link nav-ai" data-i18n="nav.ai">🤖 ຖາມ AI</a>
      </div>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-toggle" id="langToggle" onclick="toggleLangMenu()">
          <span id="langFlag">🇱🇦</span>
          
          <span class="lang-arrow">▾</span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-option active" data-lang="lo" onclick="selectLang('lo','🇱🇦','ລາວ')">🇱🇦 ລາວ</button>
          <button class="lang-option" data-lang="en" onclick="selectLang('en','🇬🇧','English')">🇬🇧 English</button>
          <button class="lang-option" data-lang="zh" onclick="selectLang('zh','🇨🇳','中文')">🇨🇳 中文</button>
          <button class="lang-option" data-lang="th" onclick="selectLang('th','🇹🇭','ไทย')">🇹🇭 ไทย</button>
          <button class="lang-option" data-lang="ko" onclick="selectLang('ko','🇰🇷','한국어')">🇰🇷 한국어</button>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="map-layout">
    <div class="map-sidebar" id="mapSidebar">
      <div class="map-sidebar-header">
        <h2 data-i18n="map.all">ສະຖານທີ່ທັງໝົດ</h2>
        <div class="map-filter-tabs">
          <button class="map-tab active" data-cat="" data-i18n="map.tab.all">ທັງໝົດ</button>
          <button class="map-tab" data-cat="attraction">🏔️</button>
          <button class="map-tab" data-cat="hotel">🏨</button>
          <button class="map-tab" data-cat="restaurant">🍜</button>
          <button class="map-tab" data-cat="activity">🛶</button>
        </div>
      </div>
      <div class="map-place-list" id="mapPlaceList"></div>
    </div>

    <div class="map-container">
      <iframe id="mainMap" class="main-map"
        src="https://maps.google.com/maps?q=18.9228,102.4441&z=14&output=embed"
        allowfullscreen loading="lazy">
      </iframe>
      <div class="map-open-btn">
        <a href="https://maps.google.com/maps?q=Vang+Vieng,Laos" target="_blank" class="open-google-btn">
          🗺️ <span data-i18n="map.open">ເປີດໃນ Google Maps</span>
        </a>
      </div>
    </div>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/map.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/active-trip.js"></script>
</body>
</html>
