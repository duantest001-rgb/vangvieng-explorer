<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#1050a0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="VVExplorer">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VangVieng Explorer 🌿</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/explore.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo" style="color:var(--dark)">
        <img src="../assets/logo.png" alt="logo" class="nav-logo-img" />
        <span class="logo-text">VangVieng<strong>Explorer</strong></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="../index.html" class="nav-link" data-i18n="nav.home">ໜ້າຫຼັກ</a>
        <a href="explore.html" class="nav-link active" data-i18n="nav.explore">ສຳຫຼວດ</a>
        <a href="map.html" class="nav-link" data-i18n="nav.map">ແຜນທີ່</a>
        <a href="ai-chat.html" class="nav-link nav-ai" data-i18n="nav.ai">🤖 ຖາມ AI</a>
        <a href="saved.html" class="nav-link">🔖 <span class="saved-badge" style="display:none"></span></a>
      </div>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-toggle" id="langToggle" onclick="toggleLangMenu()">
          <span id="langFlag">🇱🇦</span>
          
          <span class="lang-arrow">▾</span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-option active" data-lang="lo" onclick="selectLang('lo','🇱🇦','ລາວ')">🇱🇦 ລາວ</button>
          <button class="lang-option" data-lang="en" onclick="selectLang('en','🇬🇧','English')">🇬🇧 English</button>
          <button class="lang-option" data-lang="zh" onclick="selectLang('zh','🇨🇳','中文')">🇨🇳 中文</button>
          <button class="lang-option" data-lang="th" onclick="selectLang('th','🇹🇭','ไทย')">🇹🇭 ไทย</button>
          <button class="lang-option" data-lang="ko" onclick="selectLang('ko','🇰🇷','한국어')">🇰🇷 한국어</button>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="page-header">
    <div class="container">
      <p class="section-label">ວັງວຽງ, ລາວ</p>
      <h1 class="page-title" data-i18n="explore.title">ສຳຫຼວດທຸກສະຖານທີ່</h1>
      <p class="page-sub" data-i18n="explore.sub">ຄົ້ນຫາ ແລະ ກອງຂໍ້ມູນ ສະຖານທີ່ທ່ອງທ່ຽວ, ທີ່ພັກ, ຮ້ານອາຫານ ແລະ ກິດຈະກຳ</p>
    </div>
  </section>

  <section class="filters-section">
    <div class="container">
      <div class="explore-search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="exploreSearch" placeholder="ຄົ້ນຫາ..." />
        <button class="clear-btn" id="clearSearch" style="display:none" onclick="clearSearch()">✕</button>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-cat="" data-i18n="filter.all">🗺️ ທັງໝົດ</button>
        <button class="filter-tab" data-cat="attraction" data-i18n="filter.attraction">🏔️ ສະຖານທີ່</button>
        <button class="filter-tab" data-cat="hotel" data-i18n="filter.hotel">🏨 ທີ່ພັກ</button>
        <button class="filter-tab" data-cat="restaurant" data-i18n="filter.restaurant">🍜 ຮ້ານອາຫານ</button>
        <button class="filter-tab" data-cat="activity" data-i18n="filter.activity">🛶 ກິດຈະກຳ</button>
        <button class="filter-tab eco-tab" data-eco="true">🌱 Eco</button>
      </div>
      <div class="results-bar">
        <span id="resultsCount" data-i18n="filter.loading">ກຳລັງໂຫລດ...</span>
        <div class="sort-box">
          <label data-i18n="sort.label">ຮຽງຕາມ:</label>
          <select id="sortSelect" onchange="handleSort()">
            <option value="rating" data-i18n="sort.rating">⭐ Rating</option>
            <option value="name" data-i18n="sort.name">🔤 ຊື່</option>
            <option value="price_asc" data-i18n="sort.price">💰 ລາຄາ (ຖືກ→ແພງ)</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <section class="section explore-section">
    <div class="container">
      <div class="places-grid" id="exploreGrid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p data-i18n="footer.copy">© 2025 VangVieng Explorer · Made with 🌿 in Laos</p>
    </div>
  </footer>

  <script src="../js/supabase.js"></script>
  <script src="../js/saved.js"></script>
  <script src="../js/explore.js"></script>
  <script src="../js/i18n.js"></script>
</body>
</html>
