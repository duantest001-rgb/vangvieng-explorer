<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ຈອງ — VangVieng Explorer</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .booking-hero{background:linear-gradient(135deg,#071830,#1050a0);color:#fff;padding:3rem 1.5rem 2rem;text-align:center;}
    .booking-hero h1{font-size:1.6rem;font-weight:800;margin-bottom:8px;}
    .booking-hero p{font-size:0.9rem;opacity:0.8;}
    .booking-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;padding:1.5rem;max-width:600px;margin:0 auto;}
    .bk-card{background:#fff;border-radius:16px;padding:1.5rem 1rem;text-align:center;cursor:pointer;
      box-shadow:0 4px 20px rgba(7,24,48,0.08);border:2px solid transparent;transition:all .2s;}
    .bk-card:hover{border-color:#1050a0;transform:translateY(-3px);box-shadow:0 8px 30px rgba(16,80,160,0.15);}
    .bk-card .icon{font-size:2.5rem;margin-bottom:12px;}
    .bk-card h3{font-size:1rem;font-weight:700;color:#071830;margin-bottom:4px;}
    .bk-card p{font-size:0.78rem;color:#6b7a99;}
    body{min-height:100vh;background:#f5f7fa;}
    .page-wrap{padding-top:72px;}
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo" style="color:var(--dark)">
        <img src="../assets/logo.png" alt="logo" class="nav-logo-img" />
        <span class="logo-text">VangVieng<strong>Explorer</strong></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="../index.html" class="nav-link" data-i18n="nav.home">ໜ້າຫຼັກ</a>
        <a href="explore.html" class="nav-link" data-i18n="nav.explore">ສຳຫຼວດ</a>
        <a href="map.html" class="nav-link" data-i18n="nav.map">ແຜນທີ່</a>
        <a href="ai-chat.html" class="nav-link nav-ai" data-i18n="nav.ai">🤖 ຖາມ AI</a>
      </div>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-toggle" id="langToggle" onclick="toggleLangMenu()">
          <span id="langFlag">🇱🇦</span>
          <span class="lang-arrow">▾</span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-option active" data-lang="lo" onclick="selectLang('lo','🇱🇦','ລາວ')">🇱🇦 ລາວ</button>
          <button class="lang-option" data-lang="en" onclick="selectLang('en','🇬🇧','English')">🇬🇧 English</button>
          <button class="lang-option" data-lang="zh" onclick="selectLang('zh','🇨🇳','中文')">🇨🇳 中文</button>
          <button class="lang-option" data-lang="th" onclick="selectLang('th','🇹🇭','ไทย')">🇹🇭 ไทย</button>
          <button class="lang-option" data-lang="ko" onclick="selectLang('ko','🇰🇷','한국어')">🇰🇷 한국어</button>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-wrap">
  <div class="booking-hero">
    <h1 data-i18n="bk.title">🎫 ຈອງ / Book</h1>
    <p data-i18n="bk.sub">ເລືອກປະເພດການຈອງທີ່ທ່ານຕ້ອງການ</p>
  </div>

  <div class="booking-grid">
    <div class="bk-card" onclick="openBooking('activity')">
      <div class="icon">🏔️</div>
      <h3 data-i18n="bk.activity">ກິດຈະກຳ</h3>
      <p data-i18n="bk.activity.sub">Kayak, Zipline, Cave tour...</p>
    </div>
    <div class="bk-card" onclick="openBooking('hotel')">
      <div class="icon">🏨</div>
      <h3 data-i18n="bk.hotel">ທີ່ພັກ</h3>
      <p data-i18n="bk.hotel.sub">Hotel, Resort, Guesthouse</p>
    </div>
    <div class="bk-card" onclick="openBooking('taxi')">
      <div class="icon">🚕</div>
      <h3 data-i18n="bk.taxi">Taxi/Transfer</h3>
      <p data-i18n="bk.taxi.sub">ຮັບສົ່ງ, Airport transfer</p>
    </div>
    <div class="bk-card" onclick="openBooking('bike')">
      <div class="icon">🛵</div>
      <h3 data-i18n="bk.bike">ລົດຈັກ/ATV</h3>
      <p data-i18n="bk.bike.sub">Scooter, ATV, Bicycle</p>
    </div>
  </div>

  </div>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/booking.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/i18n.js"></script>
  <script>
    // ── Navbar hamburger ──
    document.addEventListener('DOMContentLoaded', () => {
      Auth.injectBadge();
      // Hamburger
      const hamburger = document.getElementById('hamburger');
      const navLinks  = document.getElementById('navLinks');
      if (hamburger && navLinks) {
        hamburger.addEventListener('click', () => {
          const isOpen = navLinks.classList.toggle('open');
          hamburger.classList.toggle('active', isOpen);
        });
      }
      const type = new URLSearchParams(window.location.search).get('type');
      if (type) setTimeout(() => openBooking(type), 100);
    });
  </script>
</body>
</html>
