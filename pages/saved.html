  <title>ລາຍການທີ່ບັນທຶກ · VangVieng Explorer</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/explore.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    .saved-toolbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 14px 0; position: sticky; top: 64px; z-index: 90;
      box-shadow: var(--shadow-sm);
    }
    .saved-toolbar .container {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .saved-count { font-size: 0.88rem; font-weight: 600; color: var(--muted); }
    .toolbar-btns { display: flex; gap: 8px; }
    .btn-share {
      padding: 8px 18px; border-radius: var(--radius-xl);
      background: var(--green-100); color: var(--green-700);
      font-size: 0.83rem; font-weight: 600; font-family: var(--font-body);
      border: 1.5px solid var(--green-300); cursor: pointer;
      transition: var(--transition);
    }
    .btn-share:hover { background: var(--green-700); color: var(--white); border-color: var(--green-700); }
    .btn-clear {
      padding: 8px 18px; border-radius: var(--radius-xl);
      background: #fff0f0; color: #c0392b;
      font-size: 0.83rem; font-weight: 600; font-family: var(--font-body);
      border: 1.5px solid #ffc8c8; cursor: pointer; transition: var(--transition);
    }
    .btn-clear:hover { background: #c0392b; color: var(--white); border-color: #c0392b; }
    .btn-share:disabled, .btn-clear:disabled { opacity: 0.35; pointer-events: none; }
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 36px 32px; max-width: 360px; width: 100%; text-align: center;
    }
    .modal-box .icon { font-size: 2.5rem; margin-bottom: 16px; }
    .modal-box h3 { font-size: 1.1rem; font-weight: 700; color: var(--dark); margin-bottom: 10px; }
    .modal-box p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
    .modal-btns { display: flex; gap: 12px; }
    .modal-cancel {
      flex: 1; padding: 11px; border-radius: var(--radius-xl);
      background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text); font-size: 0.9rem; font-weight: 600;
      font-family: var(--font-body); cursor: pointer;
    }
    .modal-confirm {
      flex: 1; padding: 11px; border-radius: var(--radius-xl);
      background: #c0392b; border: none; color: var(--white);
      font-size: 0.9rem; font-weight: 600; font-family: var(--font-body); cursor: pointer;
    }
    /* Nav badge */
    .saved-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--green-700); color: white;
      font-size: 0.65rem; font-weight: 700;
      min-width: 16px; height: 16px; border-radius: 99px;
      padding: 0 4px; margin-left: 2px; vertical-align: middle;
    }
  </style>
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo" style="color:var(--dark)">
        <img src="../assets/logo.png" alt="logo" class="nav-logo-img" />
        <span class="logo-text">VangVieng<strong>Explorer</strong></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="../index.html" class="nav-link" data-i18n="nav.home">ໜ້າຫຼັກ</a>
        <a href="explore.html" class="nav-link" data-i18n="nav.explore">ສຳຫຼວດ</a>
        <a href="map.html" class="nav-link" data-i18n="nav.map">ແຜນທີ່</a>
        <a href="ai-chat.html" class="nav-link nav-ai" data-i18n="nav.ai">🤖 ຖາມ AI</a>
        <a href="saved.html" class="nav-link active">🔖 ບັນທຶກ <span class="saved-badge" style="display:none"></span></a>
      </div>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-toggle" id="langToggle" onclick="toggleLangMenu()">
          <span id="langFlag">🇱🇦</span>
          <span class="lang-arrow">▾</span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-option active" data-lang="lo" onclick="selectLang('lo','🇱🇦','ລາວ')">🇱🇦 ລາວ</button>
          <button class="lang-option" data-lang="en" onclick="selectLang('en','🇬🇧','English')">🇬🇧 English</button>
          <button class="lang-option" data-lang="zh" onclick="selectLang('zh','🇨🇳','中文')">🇨🇳 中文</button>
          <button class="lang-option" data-lang="th" onclick="selectLang('th','🇹🇭','ไทย')">🇹🇭 ไทย</button>
          <button class="lang-option" data-lang="ko" onclick="selectLang('ko','🇰🇷','한국어')">🇰🇷 한국어</button>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="page-header">
    <div class="container">
      <p class="page-sub" style="font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;opacity:0.6;">🔖 ລາຍການຂອງຂ້ອຍ</p>
      <h1 class="page-title">ສະຖານທີ່ທີ່ບັນທຶກ</h1>
      <p class="page-sub">ສະຖານທີ່ທີ່ເຈົ້າຢາກໄປ — ເກັບໄວ້ໃນທີ່ດຽວ</p>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="saved-toolbar">
    <div class="container">
      <span class="saved-count" id="savedCount">0 ສະຖານທີ່</span>
      <div class="toolbar-btns">
        <button class="btn-share" id="btnShare" onclick="shareList()" disabled>📤 ແບ່ງປັນ</button>
        <button class="btn-clear" id="btnClear" onclick="confirmClear()" disabled>🗑️ ລ້າງທັງໝົດ</button>
      </div>
    </div>
  </div>

  <!-- GRID -->
  <section class="section explore-section">
    <div class="container">
      <div class="places-grid" id="savedGrid"></div>
    </div>
  </section>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="icon">🗑️</div>
      <h3>ລ້າງລາຍການທັງໝົດ?</h3>
      <p>ສະຖານທີ່ທີ່ບັນທຶກທັງໝົດຈະຖືກລົບ ບໍ່ສາມາດກູ້ຄືນໄດ້</p>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">ຍົກເລີກ</button>
        <button class="modal-confirm" onclick="clearAll()">ລ້າງທັງໝົດ</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom">
      <p data-i18n="footer.copy">© 2025 VangVieng Explorer · Made with 🌿 in Laos</p>
    </div>
  </footer>

  <script src="../js/saved.js"></script>
  <script src="../js/i18n.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderSavedPage();
      updateNavBadge();
      // navbar hamburger
      const hamburger = document.getElementById("hamburger");
      const navLinks  = document.getElementById("navLinks");
      if (hamburger && navLinks) {
        hamburger.addEventListener("click", () => navLinks.classList.toggle("open"));
      }
    });
  </script>
  <script src="../js/active-trip.js"></script>
</body>
</html>
