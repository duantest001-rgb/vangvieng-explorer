<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VangVieng Explorer 🌿</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/detail.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo" style="color:var(--dark)">
        <img src="../assets/logo.png" alt="logo" class="nav-logo-img" />
        <span class="logo-text">VangVieng<strong>Explorer</strong></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="../index.html" class="nav-link" data-i18n="nav.home">ໜ້າຫຼັກ</a>
        <a href="explore.html" class="nav-link active" data-i18n="nav.explore">ສຳຫຼວດ</a>
        <a href="map.html" class="nav-link" data-i18n="nav.map">ແຜນທີ່</a>
        <a href="ai-chat.html" class="nav-link nav-ai" data-i18n="nav.ai">🤖 ຖາມ AI</a>
        <a href="saved.html" class="nav-link" id="navSaved">🔖 <span id="savedBadge"></span></a>
      </div>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-toggle" id="langToggle" onclick="toggleLangMenu()">
          <span id="langFlag">🇱🇦</span>
          
          <span class="lang-arrow">▾</span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-option active" data-lang="lo" onclick="selectLang('lo','🇱🇦','ລາວ')">🇱🇦 ລາວ</button>
          <button class="lang-option" data-lang="en" onclick="selectLang('en','🇬🇧','English')">🇬🇧 English</button>
          <button class="lang-option" data-lang="zh" onclick="selectLang('zh','🇨🇳','中文')">🇨🇳 中文</button>
          <button class="lang-option" data-lang="th" onclick="selectLang('th','🇹🇭','ไทย')">🇹🇭 ไทย</button>
          <button class="lang-option" data-lang="ko" onclick="selectLang('ko','🇰🇷','한국어')">🇰🇷 한국어</button>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="back-bar">
    <div class="container">
      <button onclick="history.back()" class="back-btn" data-i18n="detail.back">← ກັບຄືນ</button>
    </div>
  </div>

  <main class="detail-main" id="detailContent">
    <div class="container">
      <div class="loading-detail">
        <div class="loading-card" style="height:320px; border-radius:24px;"></div>
        <div style="margin-top:24px">
          <div class="loading-card" style="height:32px; width:60%; margin-bottom:12px;"></div>
          <div class="loading-card" style="height:20px; width:80%; margin-bottom:8px;"></div>
          <div class="loading-card" style="height:20px; width:70%;"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <p data-i18n="footer.copy">© 2025 VangVieng Explorer · Made with 🌿 in Laos</p>
    </div>
  </footer>

  <script src="../js/supabase.js"></script>
  <script src="../js/saved.js"></script>
  <script src="../js/detail.js"></script>
  <script src="../js/i18n.js"></script>
</body>
</html>
